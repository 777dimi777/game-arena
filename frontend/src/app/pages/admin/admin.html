<section class="admin-page">
  <div class="page-header">
    <p class="eyebrow">Administration</p>
    <h1>GameArena control panel</h1>
    <p>
      Manage games, tournaments, teams and match results.
    </p>
  </div>

  <div class="admin-content">
    <app-admin-game-form
      (gameCreated)="onGameCreated($event)"
    ></app-admin-game-form>

    <section class="result-card" *ngIf="lastCreatedGame">
      <p class="eyebrow">Latest created game</p>

      <h2>{{ lastCreatedGame.name }}</h2>

      <p>
        {{ lastCreatedGame.genre }} · Team size:
        {{ lastCreatedGame.teamSize }}
      </p>
    </section>
  </div>
</section>
