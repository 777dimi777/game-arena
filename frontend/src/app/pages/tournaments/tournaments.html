<section class="page">
  <div class="page-header">
    <p class="eyebrow">GameArena tournaments</p>
    <h1>Available tournaments</h1>
    <p>
      Browse active tournaments and join with your team.
    </p>
  </div>

  <p class="loading-message" *ngIf="loading$ | async">
    Loading tournaments...
  </p>

  <p class="error-message" *ngIf="error$ | async as error">
    {{ error }}
  </p>

  <ng-container *ngIf="!(loading$ | async)">
    <ng-container *ngIf="tournaments$ | async as tournaments">
      <div
        class="tournament-grid"
        *ngIf="tournaments.length > 0; else noTournaments"
      >
        <app-tournament-card
          *ngFor="let tournament of tournaments"
          [tournament]="tournament"
          (selected)="goToTournament($event)"
        ></app-tournament-card>
      </div>

      <ng-template #noTournaments>
        <p class="empty-message">
          No tournaments are currently available.
        </p>
      </ng-template>
    </ng-container>
  </ng-container>
</section>
