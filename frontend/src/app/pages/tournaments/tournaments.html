<section class="page">
  <div class="page-header">
    <p class="eyebrow">Available tournaments</p>
    <h1>Choose your next challenge</h1>
    <p>Browse open gaming tournaments, check prize pools and join with your team.</p>
  </div>

  <div class="tournament-grid">
    <app-tournament-card
      *ngFor="let tournament of tournaments$ | async"
      [tournament]="tournament"
      (selected)="onTournamentSelected($event)"
    ></app-tournament-card>
  </div>

  <p class="empty-message" *ngIf="(tournaments$ | async)?.length === 0">
    No tournaments are currently available.
  </p>
</section>
