<section class="register-page">
  <div class="register-card">
    <p class="eyebrow">Create your account</p>

    <h1>Join GameArena</h1>

    <p class="subtitle">
      Create teams, enter tournaments and track your competitive progress.
    </p>

    <form (ngSubmit)="onSubmit()">
      <label for="username">Username</label>

      <input
        id="username"
        type="text"
        name="username"
        [(ngModel)]="username"
        placeholder="Choose a username"
        required
      />

      <label for="email">Email</label>

      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="player@example.com"
        required
      />

      <label for="password">Password</label>

      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="Minimum 6 characters"
        minlength="6"
        required
      />

      <label for="confirmPassword">Confirm password</label>

      <input
        id="confirmPassword"
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        placeholder="Repeat your password"
        required
      />

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <p class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </p>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="login-link">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</section>
