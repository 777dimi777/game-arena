<section class="profile-page">
  <div class="profile-card" *ngIf="user">
    <div class="avatar">
      {{ user.username.charAt(0).toUpperCase() }}
    </div>

    <div>
      <p class="eyebrow">Player profile</p>
      <h1>{{ user.username }}</h1>
      <p>{{ user.email }}</p>
      <span class="role">{{ user.role }}</span>
    </div>
  </div>
</section>
